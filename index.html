<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LABIABA INDONESIA - Kompetisi Roket Air</title>
  
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght=500;600;700;800&family=Nunito:wght=400;600;700;800;900&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background-color: #0B6FC9;
  }

  .rw-root {
    --sky-top: #5AC8FA;
    --sky-mid: #2E9BF0;
    --sky-bottom: #0B6FC9;
    --sun: #FFD23F;
    --flame: #FF6B35;
    --grass: #06D6A0;
    --ink: #0B2545;
    --white: #FFFFFF;
    --gold: #FFC93C;
    --silver: #B9C6D3;
    --bronze: #E0965E;
    --card-shadow: 0 10px 30px rgba(11,37,69,0.25);
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
    padding: 24px 20px 40px;
    box-sizing: border-box;
  }

  .rw-root * { box-sizing: border-box; }

  .rw-cloud {
    position: absolute;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    filter: blur(0.5px);
    pointer-events: none;
  }

  .rw-star {
    position: absolute;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    animation: rw-twinkle 2.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes rw-twinkle { 0%,100%{opacity:.3; transform:scale(0.8)} 50%{opacity:1; transform:scale(1.15)} }

  .rw-header {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
    max-width: 1000px;
    margin: 0 auto;
    text-align: center;
  }

  .rw-title-wrap { 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    gap: 12px; 
  }

  .rw-logo-badge {
    width: 72px; height: 72px;
    object-fit: contain;
    background: var(--white);
    border-radius: 20px;
    padding: 4px;
    box-shadow: var(--card-shadow);
    animation: rw-bob 3s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes rw-bob { 0%,100%{transform: translateY(0) rotate(-2deg)} 50%{transform: translateY(-6px) rotate(2deg)} }

  .rw-title h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 34px;
    margin: 0;
    color: var(--white);
    text-shadow: 0 3px 0 rgba(11,37,69,0.35);
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .rw-title p {
    margin: 4px 0 0;
    color: rgba(255,255,255,0.95);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .rw-section-label {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin: 36px 0 16px;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.9;
    position: relative;
    z-index: 2;
  }

  /* --- LEADERBOARD & PODIUM STYLING --- */
  .rw-podium {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 16px;
    margin: 15px auto 0;
    max-width: 700px;
  }

  .rw-pcard {
    background: var(--white);
    border-radius: 20px;
    padding: 18px 14px 20px;
    width: 33%;
    min-width: 150px;
    text-align: center;
    box-shadow: var(--card-shadow);
    position: relative;
    transition: transform 0.2s ease;
  }
  .rw-pcard:hover { transform: translateY(-4px); }

  .rw-pcard.gold { border: 5px solid var(--gold); order: 2; padding-top: 24px; box-shadow: 0 0 0 6px rgba(255,201,60,0.25), var(--card-shadow); }
  .rw-pcard.silver { border: 5px solid var(--silver); order: 1; margin-bottom: 15px; }
  .rw-pcard.bronze { border: 5px solid var(--bronze); order: 3; margin-bottom: 25px; }

  .rw-medal { font-size: 32px; display:block; margin-bottom: 2px; }
  .rw-pcard.gold .rw-medal { font-size: 40px; }

  .rw-rank-tag {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 11px;
    color: var(--white);
    background: var(--ink);
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .rw-pcard.gold .rw-rank-tag { background: var(--gold); color: var(--ink); }
  .rw-pcard.silver .rw-rank-tag { background: var(--silver); color: var(--ink); }
  .rw-pcard.bronze .rw-rank-tag { background: var(--bronze); color: var(--white); }

  .rw-target-mini { margin: 6px auto 8px; display: block; }

  .rw-pname {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin: 4px 0 0px;
    word-break: break-word;
    line-height: 1.2;
  }
  .rw-pschool {
    font-size: 12px;
    opacity: 0.7;
    font-weight: 600;
    margin-bottom: 6px;
    word-break: break-word;
  }
  .rw-pscore {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--flame);
  }
  .rw-pscore span { font-size: 12px; font-weight: 700; color: var(--ink); opacity: 0.6; }

  .rw-list {
    position: relative;
    z-index: 2;
    max-width: 700px;
    margin: 24px auto 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Baris List Leaderboard (DIKUNCI AGAR WAJIB LURUS SEJAJAR) */
  .rw-row {
    background: rgba(255,255,255,0.95);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    align-items: center !important;
    justify-content: space-between !important;
    box-shadow: 0 4px 14px rgba(11,37,69,0.15);
  }

  .rw-row-rank {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--white);
    background: var(--sky-mid);
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex !important; align-items:center !important; justify-content:center !important;
    flex-shrink: 0 !important;
    margin-right: 12px;
  }

  .rw-row-name-container { 
    flex: 1 !important; 
    min-width: 0 !important; 
    margin-right: 12px;
    display: flex;
    flex-direction: column;
  }
  .rw-row-name { 
    font-weight: 800; 
    font-size: 14px; 
    display: block; 
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rw-row-school { 
    font-size: 12px; 
    opacity: 0.6; 
    font-weight: 600; 
    display: block; 
    margin-top: 1px; 
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rw-row-score { 
    font-weight: 900; 
    color: var(--flame); 
    font-size: 16px; 
    white-space: nowrap !important; 
    flex-shrink: 0 !important;
    text-align: right;
  }
  .rw-row-score small { color: var(--ink); opacity:0.5; font-weight:700; font-size: 12px; }

  .rw-row.rw-status-notarget { background: rgba(253, 232, 228, 0.95); }
  .rw-row.rw-status-notarget .rw-row-score { color: #C6401F; font-weight: 800; font-size: 13px; }
  .rw-row.rw-pending { opacity: 0.65; }
  .rw-row.rw-pending .rw-row-score { color: var(--ink); opacity: 0.5; font-size: 13px; font-weight: 700; }

  .rw-empty {
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    padding: 30px 10px;
    position: relative; z-index: 2;
    font-family: 'Baloo 2', sans-serif;
  }

  /* --- FOOTER ACTIONS (LOGIN & WATERMARK) --- */
  .rw-footer-actions {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 2;
  }

  .rw-login-btn {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 14px;
    background: var(--white);
    color: var(--ink);
    border: none;
    border-radius: 14px;
    padding: 12px 24px;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    display: flex; align-items:center; gap:8px;
    transition: all 0.2s ease;
  }
  .rw-login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(11,37,69,0.35); }
  .rw-login-btn.active { background: var(--grass); color: var(--white); }

  .rw-watermark {
    font-size: 12px;
    font-weight: 800;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.5px;
    pointer-events: none;
    text-shadow: 0 1px 1px rgba(0,0,0,0.1);
  }

  /* Modal Admin */
  .rw-overlay {
    position: fixed; inset: 0;
    background: rgba(11,37,69,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .rw-overlay.open { display: flex; }
  .rw-modal {
    background: var(--white);
    border-radius: 20px;
    padding: 26px 24px;
    width: 100%; max-width: 320px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .rw-modal h3 { font-family: 'Baloo 2', sans-serif; margin: 6px 0 14px; font-size: 18px; }
  .rw-modal input {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 2px solid #dbe6f2; font-size: 15px; font-family: 'Nunito', sans-serif;
    outline: none; margin-bottom: 10px;
  }
  .rw-modal input:focus { border-color: var(--sky-mid); }
  .rw-modal-error { color: #E4572E; font-size: 12px; font-weight: 700; min-height: 16px; margin-bottom: 6px; }
  .rw-modal-btns { display: flex; gap: 8px; margin-top: 6px; }
  .rw-btn {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; border: none;
    border-radius: 12px; padding: 11px 16px; cursor: pointer; font-size: 14px;
    flex: 1; transition: transform 0.12s ease;
  }
  .rw-btn:hover { transform: translateY(-1px); }
  .rw-btn.primary { background: var(--sky-mid); color: var(--white); }
  .rw-btn.ghost { background: #eef2f7; color: var(--ink); }

  /* Admin panel */
  .rw-admin {
    position: relative; z-index: 2; max-width: 700px; margin: 26px auto 0;
    background: rgba(255,255,255,0.97); border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow);
  }
  .rw-admin-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 10px;
  }
  .rw-admin h3 { font-family: 'Baloo 2', sans-serif; margin: 0; font-size: 17px; }
  .rw-admin p.rw-sub { margin: 0 0 16px; font-size: 12px; opacity: 0.6; font-weight: 700; }

  .rw-btn-reset {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 12px;
    background: #E4572E; color: var(--white); border: none; border-radius: 8px;
    padding: 6px 12px; cursor: pointer; transition: transform 0.1s ease;
  }
  .rw-btn-reset:hover { background: #cc4e29; transform: scale(1.02); }

  .rw-import-box {
    background: #f0f4f8; padding: 12px 14px; border-radius: 12px; margin-bottom: 16px;
    border: 2px dashed #cbd5e1; display: flex; align-items: center; gap: 12px; justify-content: space-between; flex-wrap: wrap;
  }
  .rw-import-box label { font-size: 12px; font-weight: 800; color: var(--ink); }
  .rw-import-box input[type="file"] { font-size: 12px; font-family: inherit; font-weight: 600; }

  .rw-add-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .rw-add-form input {
    flex: 1; min-width: 140px; padding: 10px 12px; border-radius: 10px;
    border: 2px solid #dbe6f2; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; outline: none;
  }
  .rw-add-form input:focus { border-color: var(--sky-mid); }
  .rw-add-form button {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; background: var(--flame);
    color: var(--white); border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; font-size: 14px;
  }

  .rw-admin-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 0; border-top: 1px dashed #e0e8f0;
  }
  .rw-admin-row:first-of-type { border-top: none; }
  .rw-admin-row .rw-a-name-box { flex: 1; min-width: 130px; }
  .rw-admin-row .rw-a-name { font-weight: 800; font-size: 14px; display: block; }
  .rw-admin-row .rw-a-school { font-size: 11.5px; opacity: 0.6; font-weight: 700; display: block; }

  .rw-admin-row .rw-a-field { display: flex; align-items: center; gap: 4px; }
  .rw-admin-row .rw-a-field label { font-size: 10px; font-weight: 800; opacity: 0.5; }
  .rw-admin-row input[type="text"] {
    width: 74px; padding: 7px 8px; border-radius: 8px; border: 2px solid #dbe6f2;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; outline: none; text-align: center;
  }
  .rw-admin-row input[type="text"]:focus { border-color: var(--sky-mid); }
  .rw-a-btns { display: flex; gap: 6px; }
  .rw-a-btns button {
    border: none; border-radius: 8px; padding: 7px 10px; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer;
  }
  .rw-a-save { background: var(--grass); color: white; }
  .rw-a-del { background: #FDE8E4; color: #C6401F; }

  .rw-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: white; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 13px;
    padding: 12px 20px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); opacity: 0; transition: all 0.3s ease; z-index: 60; pointer-events: none;
  }
  .rw-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ==========================================================================
     MEDIA QUERIES - RESPONSIVE DI HP (MAKSIMAL 640PX)
     ========================================================================= */
  @media (max-width: 640px) {
    .rw-root { padding: 16px 12px 30px; }
    .rw-title h1 { font-size: 26px; }
    .rw-title p { font-size: 10px; }

    /* Susunan Podium Vertikal di Layar HP */
    .rw-podium {
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .rw-pcard {
      width: 100%;
      max-width: 300px;
      margin-bottom: 0 !important;
      padding: 14px 12px;
    }
    .rw-pcard.gold { order: 1; padding-top: 18px; }
    .rw-pcard.silver { order: 2; }
    .rw-pcard.bronze { order: 3; }

    /* Batasi lebar teks nama di HP agar muat & otomatis berganti jadi titik-titik jika terlalu panjang */
    .rw-row-name, .rw-row-school {
      max-width: 150px !important;
    }
    .rw-row-score {
      font-size: 14px !important;
    }

    /* Penyesuaian Panel Admin di HP */
    .rw-import-box { flex-direction: column; align-items: stretch; text-align: center; gap: 8px; }
    .rw-import-box input[type="file"] { width: 100%; }
    .rw-add-form { flex-direction: column; gap: 8px; }
    .rw-add-form input, .rw-add-form button { width: 100% !important; flex: none; }
    .rw-admin-row { flex-direction: column; align-items: stretch; gap: 10px; padding: 14px 0; }
    .rw-a-name-box { text-align: center; }
    .rw-admin-row .rw-a-field { justify-content: space-between; background: #f1f5f9; padding: 6px 12px; border-radius: 8px; }
    .rw-admin-row input[type="text"] { width: 100px; padding: 6px; }
    .rw-a-btns { justify-content: center; }
    .rw-a-btns button { flex: 1; padding: 10px; font-size: 13px; }
  }

  @media (max-width: 380px) {
    .rw-row-name, .rw-row-school {
      max-width: 110px !important;
    }
  }
  </style>
</head>
<body>

<div class="rw-root" id="rwRoot">
  <div class="rw-cloud" style="width:90px;height:34px;top:14px;left:6%;"></div>
  <div class="rw-cloud" style="width:60px;height:24px;top:40px;left:78%;"></div>
  <div class="rw-cloud" style="width:70px;height:26px;top:8px;left:45%;"></div>
  <div class="rw-star" style="top:70px;left:15%;">✦</div>
  <div class="rw-star" style="top:100px;left:88%; animation-delay:0.8s;">✦</div>
  <div class="rw-star" style="top:20px;left:60%; animation-delay:1.4s;">✦</div>

  <div class="rw-header">
    <div class="rw-title-wrap">
      <img src="logo.jpg" class="rw-logo-badge" alt="Logo LABIABA">
      <div class="rw-title">
        <h1>LABIABA INDONESIA</h1>
        <p id="rwSubtitle">Kompetisi Roket Air Regional Kalimantan Barat</p>
      </div>
    </div>
  </div>

  <div class="rw-section-label">🏆 Podium Juara 🏆</div>
  <div class="rw-podium" id="rwPodium"></div>

  <div class="rw-section-label" id="rwOtherLabel" style="display:none;">Peringkat Lainnya</div>
  <div class="rw-list" id="rwList"></div>

  <div id="rwEmpty" class="rw-empty">Loading... 🛰️</div>

  <div id="rwAdminPanel" class="rw-admin" style="display:none;">
    <div class="rw-admin-header">
      <h3>🛠️ Panel Panitia</h3>
      <button type="button" class="rw-btn-reset" id="rwResetBtn">💥 Reset Semua Data</button>
    </div>
    <p class="rw-sub">Masukkan jarak mendarat (meter) atau berikan tanda strip/minus (<code>-</code>) jika peluncuran tidak mencapai target.</p>
    
    <div class="rw-import-box">
      <label>📂 Import Peserta dari CSV:</label>
      <input type="file" id="rwCsvFile" accept=".csv">
    </div>

    <div class="rw-add-form">
      <input type="text" id="rwNewName" placeholder="Nama tim / peserta...">
      <input type="text" id="rwNewSchool" placeholder="Asal sekolah...">
      <button type="button" id="rwAddBtn">+ Tambah Tim</button>
    </div>
    
    <div id="rwAdminList"></div>
  </div>

  <div class="rw-footer-actions">
    <button type="button" class="rw-login-btn" id="rwLoginBtn">🔐 Login Panitia</button>
    <div class="rw-watermark">Web dev by : Daris</div>
  </div>
</div>

<div class="rw-overlay" id="rwOverlay">
  <div class="rw-modal">
    <div style="font-size:34px;">🔑</div>
    <h3>Login Panitia</h3>
    <input type="password" id="rwPassInput" placeholder="Masukkan password...">
    <div class="rw-modal-error" id="rwPassError"></div>
    <div class="rw-modal-btns">
      <button type="button" class="rw-btn ghost" id="rwCancelBtn">Batal</button>
      <button type="button" class="rw-btn primary" id="rwSubmitBtn">Masuk</button>
    </div>
  </div>
</div>

<div class="rw-toast" id="rwToast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
(function(){
  const ADMIN_PASSWORD = 'labiaba';
  let teams = [];
  let isAdmin = false;

  const firebaseConfig = {
    databaseURL: "https://labiaba-default-rtdb.firebaseio.com/"
  };
  
  firebase.initializeApp(firebaseConfig);
  const dbRef = firebase.database().ref('roket_championship_v3');
  const el = (id) => document.getElementById(id);

  function toast(msg){
    const t = el('rwToast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
  }

  function bestScore(team){
    const vals = [team.launch1, team.launch2].filter(v => v !== null && v !== undefined && v !== '' && v !== '-');
    if (vals.length === 0) return null;
    return Math.min(...vals.map(Number));
  }

  function getTeamStatus(team){
    const l1 = team.launch1;
    const l2 = team.launch2;
    const hasLaunched = (l1 !== null && l1 !== undefined && l1 !== '') || (l2 !== null && l2 !== undefined && l2 !== '');
    
    if (!hasLaunched) return 'pending';
    const best = bestScore(team);
    if (best !== null) return 'scored';
    return 'notarget';
  }

  function miniTarget(distance, maxRef){
    const norm = Math.min(distance / maxRef, 1);
    const radius = 6 + norm * 22; 
    const angle = (distance * 137.5) % 360; 
    const rad = angle * Math.PI / 180;
    const cx = 34 + radius * Math.cos(rad);
    const cy = 34 + radius * Math.sin(rad);
    return `<svg class="rw-target-mini" width="68" height="68" viewBox="0 0 68 68">
      <circle cx="34" cy="34" r="30" fill="#FDE8E4"/>
      <circle cx="34" cy="34" r="21" fill="#FFD9C7"/>
      <circle cx="34" cy="34" r="12" fill="#FFB199"/>
      <circle cx="34" cy="34" r="4" fill="#FF6B35"/>
      <circle cx="${cx}" cy="${cy}" r="4.5" fill="#0B2545" stroke="white" stroke-width="1.5"/>
    </svg>`;
  }

  dbRef.on('value', (snapshot) => {
    const data = snapshot.val();
    teams = Array.isArray(data) ? data : [];
    render();
  });

  function saveTeamsToCloud(){
    dbRef.set(teams).catch(err => {
      toast('⚠️ Gagal menyimpan data ke cloud Firebase.');
    });
  }

  function getRankedGroups(){
    const scoredList = [];
    const noTargetList = [];
    const pendingList = [];

    teams.forEach(t => {
      const status = getTeamStatus(t);
      if (status === 'scored') {
        scoredList.push({ ...t, best: bestScore(t), groupStatus: 'scored' });
      } else if (status === 'notarget') {
        noTargetList.push({ ...t, best: null, groupStatus: 'notarget' });
      } else {
        pendingList.push({ ...t, best: null, groupStatus: 'pending' });
      }
    });

    scoredList.sort((a,b) => a.best - b.best);
    return { scoredList, noTargetList, pendingList };
  }

  function render(){
    const podiumEl = el('rwPodium');
    const listEl = el('rwList');
    const emptyEl = el('rwEmpty');
    const otherLabel = el('rwOtherLabel');

    if(!podiumEl || !listEl || !emptyEl || !otherLabel) return;

    podiumEl.innerHTML = '';
    listEl.innerHTML = '';

    if (teams.length === 0) {
      emptyEl.style.display = 'block';
      emptyEl.textContent = 'Belum ada peserta terdaftar. Panitia silakan klik tombol login di bawah untuk memasukkan data! 🛰️';
      otherLabel.style.display = 'none';
      renderAdmin();
      return;
    }
    emptyEl.style.display = 'none';

    const { scoredList, noTargetList, pendingList } = getRankedGroups();
    const maxRef = scoredList.length ? Math.max(...scoredList.map(t=>t.best), 5) : 5;
    
    const top3 = scoredList.slice(0, 3);
    const restScored = scoredList.slice(3);
    
    const medals = ['gold','silver','bronze'];
    const medalIcon = ['🥇','🥈','🥉'];

    top3.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'rw-pcard ' + medals[i];
      card.innerHTML = `
        <span class="rw-medal">${medalIcon[i]}</span>
        <span class="rw-rank-tag">RANK ${i+1}</span>
        ${miniTarget(t.best, maxRef)}
        <div class="rw-pname">${escapeHtml(t.name)}</div>
        <div class="rw-pschool">${escapeHtml(t.school || '-')}</div>
        <div class="rw-pscore">${t.best.toFixed(2)} <span>m</span></div>
      `;
      podiumEl.appendChild(card);
    });

    if (restScored.length > 0 || noTargetList.length > 0 || pendingList.length > 0) {
      otherLabel.style.display = 'block';
    } else {
      otherLabel.style.display = 'none';
    }

    restScored.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'rw-row';
      row.innerHTML = `
        <div class="rw-row-rank">${i + 4}</div>
        <div class="rw-row-name-container">
          <span class="rw-row-name">${escapeHtml(t.name)}</span>
          <span class="rw-row-school">${escapeHtml(t.school || '-')}</span>
        </div>
        <div class="rw-row-score">${t.best.toFixed(2)} <small>m</small></div>
      `;
      listEl.appendChild(row);
    });

    noTargetList.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'rw-row rw-status-notarget';
      row.innerHTML = `
        <div class="rw-row-rank" style="background:#E4572E;">–</div>
        <div class="rw-row-name-container">
          <span class="rw-row-name">${escapeHtml(t.name)}</span>
          <span class="rw-row-school">${escapeHtml(t.school || '-')}</span>
        </div>
        <div class="rw-row-score">No Target</div>
      `;
      listEl.appendChild(row);
    });

    pendingList.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'rw-row rw-pending';
      row.innerHTML = `
        <div class="rw-row-rank" style="background:#adb5bd;">–</div>
        <div class="rw-row-name-container">
          <span class="rw-row-name">${escapeHtml(t.name)}</span>
          <span class="rw-row-school">${escapeHtml(t.school || '-')}</span>
        </div>
        <div class="rw-row-score">Belum meluncur</div>
      `;
      listEl.appendChild(row);
    });

    renderAdmin();
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderAdmin(){
    const panel = el('rwAdminPanel');
    const adminListEl = el('rwAdminList');
    if (!panel || !adminListEl) return;

    if (!isAdmin) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    adminListEl.innerHTML = '';
    
    teams.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'rw-admin-row';
      row.innerHTML = `
        <div class="rw-a-name-box">
          <span class="rw-a-name">${escapeHtml(t.name)}</span>
          <span class="rw-a-school">${escapeHtml(t.school || '-')}</span>
        </div>
        <div class="rw-a-field">
          <label>L1</label>
          <input type="text" value="${t.launch1 !== null && t.launch1 !== undefined ? t.launch1 : ''}" data-id="${t.id}" data-field="launch1" placeholder="m / -">
        </div>
        <div class="rw-a-field">
          <label>L2</label>
          <input type="text" value="${t.launch2 !== null && t.launch2 !== undefined ? t.launch2 : ''}" data-id="${t.id}" data-field="launch2" placeholder="m / -">
        </div>
        <div class="rw-a-btns">
          <button type="button" class="rw-a-save" data-id="${t.id}">💾 Simpan</button>
          <button type="button" class="rw-a-del" data-id="${t.id}">🗑️</button>
        </div>
      `;
      adminListEl.appendChild(row);
    });

    adminListEl.querySelectorAll('.rw-a-save').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const input1 = document.querySelector(`#rwAdminList input[data-id="${id}"][data-field="launch1"]`);
        const input2 = document.querySelector(`#rwAdminList input[data-id="${id}"][data-field="launch2"]`);
        
        let l1 = input1 ? input1.value.trim() : '';
        let l2 = input2 ? input2.value.trim() : '';
        
        const team = teams.find(x => x.id === id);
        if (team) {
          if (l1 === '-') team.launch1 = '-';
          else if (l1 === '') team.launch1 = null;
          else team.launch1 = isNaN(parseFloat(l1)) ? null : parseFloat(l1);

          if (l2 === '-') team.launch2 = '-';
          else if (l2 === '') team.launch2 = null;
          else team.launch2 = isNaN(parseFloat(l2)) ? null : parseFloat(l2);

          saveTeamsToCloud();
          toast('✅ Data disimpan online!');
        }
      });
    });

    adminListEl.querySelectorAll('.rw-a-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const team = teams.find(x => x.id === id);
        if (!team) return;
        if (!confirm(`Hapus data peserta "${team.name}"?`)) return;
        teams = teams.filter(x => x.id !== id);
        saveTeamsToCloud();
        toast('🗑️ Peserta berhasil dihapus');
      });
    });
  }

  el('rwCsvFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
      const contents = evt.target.result;
      const lines = contents.split(/\r?\n/);
      let count = 0;

      lines.forEach(line => {
        if (!line.trim()) return;
        const cols = line.split(/[,;]/);
        if (cols.length >= 1) {
          const rawName = cols[0].trim();
          const rawSchool = cols[1] ? cols[1].trim() : '';

          if (rawName.toLowerCase() === 'nama' || rawName.toLowerCase() === 'name') return;

          if (rawName) {
            const newId = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
            teams.push({
              id: newId,
              name: rawName,
              school: rawSchool,
              launch1: null,
              launch2: null
            });
            count++;
          }
        }
      });

      if (count > 0) {
        saveTeamsToCloud();
        toast(`🎉 Berhasil memasukkan ${count} tim dari CSV!`);
      } else {
        toast('⚠️ Format salah atau tidak ditemukan data valid di CSV.');
      }
      el('rwCsvFile').value = ''; 
    };
    reader.readAsText(file);
  });

  el('rwLoginBtn').addEventListener('click', () => {
    if (isAdmin) {
      isAdmin = false;
      el('rwLoginBtn').textContent = '🔐 Login Panitia';
      el('rwLoginBtn').classList.remove('active');
      render();
      toast('👋 Keluar dari mode panitia');
      return;
    }
    el('rwOverlay').classList.add('open');
    el('rwPassInput').value = '';
    el('rwPassError').textContent = '';
    setTimeout(()=> el('rwPassInput').focus(), 50);
  });

  el('rwCancelBtn').addEventListener('click', () => {
    el('rwOverlay').classList.remove('open');
  });

  function attemptLogin(){
    const val = el('rwPassInput').value;
    if (val === ADMIN_PASSWORD) {
      isAdmin = true;
      el('rwOverlay').classList.remove('open');
      el('rwLoginBtn').textContent = '✅ Panitia Aktif';
      el('rwLoginBtn').classList.add('active');
      render();
      toast('🚀 Login berhasil!');
    } else {
      el('rwPassError').textContent = 'Password salah.';
    }
  }

  el('rwSubmitBtn').addEventListener('click', attemptLogin);
  el('rwPassInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
  el('rwOverlay').addEventListener('click', (e) => { if (e.target.id === 'rwOverlay') el('rwOverlay').classList.remove('open'); });

  el('rwAddBtn').addEventListener('click', () => {
    const nameInput = el('rwNewName');
    const schoolInput = el('rwNewSchool');
    if (!nameInput || !schoolInput) return;

    const name = nameInput.value.trim();
    const school = schoolInput.value.trim();

    if (!name) { toast('⚠️ Nama tidak boleh kosong'); return; }
    
    const newId = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    teams.push({ id: newId, name, school, launch1: null, launch2: null });
    
    nameInput.value = '';
    schoolInput.value = '';
    saveTeamsToCloud();
    toast('🎉 Tim baru ditambahkan online!');
  });

  el('rwResetBtn').addEventListener('click', () => {
    const yakin = confirm('⚠️ PERINGATAN KERAS!\n\nApakah Anda yakin ingin MENGHAPUS SEMUA DATA TIM dari database? Tindakan ini tidak bisa dibatalkan.');
    if (yakin) {
      dbRef.set(null)
        .then(() => { toast('💥 Database dikosongkan total!'); })
        .catch(err => { toast('⚠️ Gagal mereset database.'); });
    }
  });
})();
</script>

</body>
</html>
